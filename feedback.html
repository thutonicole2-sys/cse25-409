<!--this is were the user can provide their feedback-->
<div class="feedback-body">
    <div class="feedback-form">
        <h2>Tell us about the section</h2>
        <p>Please share your thoughts and suggestions with us. Your feedback helps us improve our products and services.</p>

        <label for="Phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>

            <label for="message">Add a comment:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br>
       <form onsubmit="clearForm(event)">
            <button type="submit">Submit Feedback</button>
                <script>
                function clearForm(event) {
                    event.preventDefault(); // Prevent form submission
                    document.getElementById('phone').value = "";
                    document.getElementById('email').value = "";
                    document.getElementById('message').value = "";
                }
                </script>
      </div>  
    </div>
