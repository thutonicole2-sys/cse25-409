        <!-- Allows the user to choose a payment method -->
<div class="payment-body">
<div class="payment">
    <h1>Choose Payment Method</h1>
    <input type="radio" name="payment" value="cod" checked>
    <label for="cod">Deposit and cash on delivery</label><br>

    <input type="radio" name="payment" value="card">
    <label for="card">Add Debit or Credit Card</label><br>

    <label for="card holder name">Card Holder Name:</label><br>
    <input type="text" id="card holder name" name="card holder name" required><br>

    <label for="card number">Card Number:</label><br>
    <input type="text" id="card number" name="card number" required><br>

    <label for="expiry date"> Expiry Date:</label><br>
    <input type="text" id="expiry date" name="expiry date" required><br>

    <label for="cvv">CVV:</label><br>
    <input type="text" id="cvv" name="cvv" required><br>
<form action="" onsubmit="clearForm(event)">
    <button type="submit">Submit Payment</button>
</form>
                <script>
                function clearForm(event) {
                    event.preventDefault(); // Prevent form submission
                    document.getElementById('card holder name').value = "";
                    document.getElementById('card number').value = "";
                    document.getElementById('expiry date').value = "";
                    document.getElementById('cvv').value = "";
                }
                </script>
                
                
</div>

<!--This is where all the items that the user has added to their cart will appear-->
<div class="order-summary">
    <h2>Order Summary</h2>
    <p>Item 1 - P0.00</p>
    <p>Item 2 - P0.00</p>

    <h3>Total: P0.00</h3>
    </div>
</div>
